name: AI-CTO Debug Schema
on:
  workflow_dispatch:

jobs:
  inspect-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pg library
        run: npm install pg

      - name: Execute SQL Inspection
        env:
          ODS_SOURCE_DATABASE_URL: ${{ secrets.ODS_SOURCE_DATABASE_URL }}
        run: |
          node -e "
          const { Client } = require('pg');
          async function run() {
            const client = new Client({
              connectionString: process.env.ODS_SOURCE_DATABASE_URL,
              ssl: { rejectUnauthorized: false }
            });
            await client.connect();
            console.log('--- INSPECCIÓN DE ESQUEMA REAL (POSTGRES STAGING) ---');
            const res = await client.query(\`
              SELECT table_name, ordinal_position, column_name, data_type, is_nullable
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name IN (
                  'technicianDailyAssignments',
                  'technicianShifts',
                  'dailyReports',
                  'installations',
                  'installationStatusHistory'
                )
              ORDER BY table_name, ordinal_position;
            \`);
            console.table(res.rows);
            await client.end();
            console.log('--- FIN DE INSPECCIÓN ---');
          }
          run().catch(err => {
            console.error('❌ Error executing SQL:', err.message);
            process.exit(1);
          });
          "
